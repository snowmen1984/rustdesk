name: Build custom self-host RustDesk clients

on:
  workflow_dispatch:
    inputs:
      id_server:
        description: "Default RustDesk ID server"
        required: true
        default: "rd.sgohome.us"
        type: string
      public_key:
        description: "Server public key from id_ed25519.pub. Leave empty if repository secret RUSTDESK_RS_PUB_KEY is set."
        required: false
        type: string
      build_windows:
        description: "Build Windows x64"
        required: true
        default: true
        type: boolean
      build_linux:
        description: "Build Linux x64"
        required: true
        default: true
        type: boolean
      build_macos:
        description: "Build macOS"
        required: true
        default: true
        type: boolean
      build_android:
        description: "Build Android APK"
        required: true
        default: true
        type: boolean
      build_ios:
        description: "Build iOS no-codesign archive"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: custom-selfhost-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  CUSTOM_ID_SERVER: ${{ inputs.id_server }}
  CUSTOM_RS_PUB_KEY: ${{ secrets.RUSTDESK_RS_PUB_KEY || inputs.public_key }}
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
  NDK_VERSION: "r27c"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-windows-x64:
    if: ${{ inputs.build_windows }}
    needs: generate-bridge
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch default self-host server
        shell: bash
        run: python3 scripts/patch-rustdesk-default-server.py

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter
        shell: bash
        run: |
          flutter doctor -v
          flutter precache --windows
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-custom-selfhost

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"

      - name: Build Windows client
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv .\flutter\build\windows\x64\runner\Release .\rustdesk-windows-x64-rd-sgohome-us

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64-rd-sgohome-us
          path: rustdesk-windows-x64-rd-sgohome-us

  build-linux-x64:
    if: ${{ inputs.build_linux }}
    needs: generate-bridge
    runs-on: ubuntu-22.04
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git python3 python3-pip nasm yasm clang cmake gcc g++ libclang-dev libgtk-3-dev libxcb-randr0-dev libxdo-dev libxfixes-dev libxcb-shape0-dev libxcb-xfixes0-dev libasound2-dev libpam0g-dev libpulse-dev libva-dev libvdpau-dev libudev-dev libsystemd-dev libdbus-1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch default self-host server
        run: python3 scripts/patch-rustdesk-default-server.py

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: linux-custom-selfhost

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"

      - name: Build Linux client
        run: |
          python3 build.py --flutter --hwcodec || python3 build.py --flutter
          mkdir -p dist-linux
          cp -a flutter/build/linux/x64/release/bundle dist-linux/rustdesk-linux-x64-rd-sgohome-us || true
          find . -maxdepth 4 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -exec cp {} dist-linux/ \; || true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-x64-rd-sgohome-us
          path: dist-linux

  build-macos:
    if: ${{ inputs.build_macos }}
    needs: generate-bridge
    runs-on: macos-13
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch default self-host server
        run: python3 scripts/patch-rustdesk-default-server.py

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: x86_64-apple-darwin,aarch64-apple-darwin
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-custom-selfhost

      - name: Build macOS client
        run: |
          python3 build.py --flutter || python3 build.py --flutter --skip-portable-pack
          mkdir -p dist-macos
          cp -a flutter/build/macos/Build/Products/Release/*.app dist-macos/ || true
          find . -maxdepth 5 -type f \( -name '*.dmg' -o -name '*.zip' \) -exec cp {} dist-macos/ \; || true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-rd-sgohome-us
          path: dist-macos

  build-android:
    if: ${{ inputs.build_android }}
    needs: generate-bridge
    runs-on: ubuntu-22.04
    steps:
      - name: Install Android dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git python3 python3-pip nasm yasm clang cmake gcc g++ libclang-dev unzip zip

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch default self-host server
        run: python3 scripts/patch-rustdesk-default-server.py

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          components: rustfmt

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Build Android APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: |
          cargo install cargo-ndk --version 3.1.2 --locked
          flutter pub get
          python3 build.py --flutter --android || flutter build apk --release
          mkdir -p dist-android
          find flutter/build/app/outputs -type f -name '*.apk' -exec cp {} dist-android/ \; || true
          find . -maxdepth 5 -type f -name '*.apk' -exec cp {} dist-android/ \; || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android-rd-sgohome-us
          path: dist-android

  build-ios:
    if: ${{ inputs.build_ios }}
    needs: generate-bridge
    runs-on: macos-13
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch default self-host server
        run: python3 scripts/patch-rustdesk-default-server.py

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim
          components: rustfmt

      - name: Build iOS no-codesign archive
        run: |
          flutter pub get
          python3 build.py --flutter --ios || flutter build ios --release --no-codesign
          mkdir -p dist-ios
          cp -a flutter/build/ios/iphoneos dist-ios/ || true
          find flutter/build/ios -type f \( -name '*.ipa' -o -name '*.xcarchive' \) -exec cp -a {} dist-ios/ \; || true

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-ios-rd-sgohome-us
          path: dist-ios
